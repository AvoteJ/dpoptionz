<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP&display=swap" rel="stylesheet">
    <title>Double Play Optionz</title>
    <style>
        body { background-color: #333333; color: white; font-family: 'Noto Sans JP', 'Hiragino Sans', 'Yu Gothic', Arial, sans-serif; display: flex; flex-direction: column; min-height: 100vh; margin: 0; }
        header { width: 100%; padding: 20px 0; }
        .nav-container { display: flex; justify-content: center; gap: 15px; }
        .nav-link { text-decoration: none; color: rgba(255, 255, 255, 0.8); background-color: transparent; border: 1px solid rgba(255, 255, 255, 0.5); padding: 8px 16px; border-radius: 4px; font-size: 14pt; }

        main { flex: 1; display: flex; flex-direction: column; align-items: center; padding-top: 100px; gap: 20px; }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(25px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .main-title { font-size: 24pt; font-weight: bold; text-transform: uppercase; letter-spacing: 2px; animation: fadeInUp 3s ease forwards; }
        .main-title .accent { color: #e91e8c; }

        .search-box-container { width: 100%; max-width: 500px; position: relative; }
        .search-container { display: flex; gap: 10px; }
        .search-input { flex: 1; padding: 12px 20px; font-size: 16px; border: 1px solid rgba(255, 255, 255, 0.3); border-radius: 25px; background-color: rgba(255, 255, 255, 0.1); color: white; outline: none; }
        .search-button { padding: 10px 25px; background-color: transparent; border: 1px solid rgba(255, 255, 255, 0.5); color: white; border-radius: 25px; cursor: pointer; }

        .suggestions { position: absolute; width: 100%; background: #444; border-radius: 10px; margin-top: 5px; display: none; list-style: none; padding: 0; z-index: 10; }
        .suggestions li { padding: 10px 20px; cursor: pointer; border-bottom: 1px solid #555; }
        .suggestions li:hover { background: #555; }

        #result-area { width: 90%; max-width: 900px; margin-top: 40px; }
        table { border-collapse: collapse; width: 100%; background-color: rgba(255, 255, 255, 0.05); }
        thead tr { background-color: #5c3333; }
        th, td { padding: 12px; border: 1px solid #555; text-align: center; font-size: 10pt; }

        .vote-btn { display: inline-block; padding: 4px 14px; background-color: transparent; border: 1px solid rgba(255, 255, 255, 0.5); color: rgba(255, 255, 255, 0.8); border-radius: 4px; text-decoration: none; font-size: 10pt; cursor: pointer; }
        .vote-btn:hover { background-color: rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body>
    <div style="width:100%; background-color:rgba(255,165,0,0.15); padding:10px 0; text-align:center; font-size:12pt; color:rgba(255,200,100,0.9);">
        &lt;BETA OPEN&gt; 현재 페이지는 지속적으로 업데이트 중으로, 오류가 아직 많습니다. 또한, Vote DB 혼선 방지를 위해 투표 기능이 작동하지 않습니다.
    </div>

    <header>
        <nav class="nav-container">
            <a href="index.html" class="nav-link">Top</a>
            <a href="table.html" class="nav-link">Table</a>
            <a href="about.html" class="nav-link">About</a>
        </nav>
    </header>

    <main>
        <h1 class="main-title"><span class="accent">D</span>ouble <span class="accent">P</span>lay Option<span class="accent" style="text-transform:none;">z</span></h1>

        <p id="version-display" style="font-size:10pt; color:rgba(255,255,255,0.3); margin:0;"></p>

        <div class="search-box-container">
            <div class="search-container">
                <input type="text" id="searchInput" class="search-input" placeholder="Title 검색..." oninput="showSuggestions()" onkeydown="if(event.key==='Enter') performSearch()">
            </div>
            <ul id="suggestionList" class="suggestions"></ul>
        </div>

        <div id="result-area"></div>
    </main>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="config.js"></script>
<script src="version.js"></script>
<script>
    let tableData     = [];
    let voteResults   = {};
    let optionDistrib = {};

    // 버전 표시
    document.addEventListener('DOMContentLoaded', () => {
        const el = document.getElementById('version-display');
        if (el && typeof APP_VERSION !== 'undefined') el.textContent = 'ver. ' + APP_VERSION;
    });

    Promise.all([
        fetch('DPOPz_DATABASE.xlsx').then(r => r.arrayBuffer()),
        fetch(`${APPS_SCRIPT_URL}?action=results`).then(r => r.json()).catch(() => ({ results: {} }))
    ])
    .then(([xlsxBuffer, voteData]) => {
        voteResults = voteData.results || {};
        const workbook = XLSX.read(xlsxBuffer, { type: 'array' });

        // Sheet1: 옵션 분포 인덱스 구성 (Timestamp=OFF 제외)
        const sheet1 = workbook.Sheets[workbook.SheetNames[0]];
        const dbRows = XLSX.utils.sheet_to_json(sheet1, { header: 1 }).slice(1)
            .filter(r => String(r[0] ?? '').toUpperCase() !== 'OFF');

        const distribMap = {};
        dbRows.forEach(r => {
            const title = String(r[1] ?? '').trim();
            const diff  = String(r[2] ?? '').trim();
            const opt1  = String(r[3] ?? '').trim() || 'OFF';
            const opt2  = String(r[4] ?? '').trim() || 'OFF';
            const opt3  = String(r[5] ?? '').trim() || 'OFF';
            if (!title || !diff) return;
            const key   = `${title}|${diff}`;
            const combo = `${opt1}|${opt2}|${opt3}`;
            if (!distribMap[key]) distribMap[key] = {};
            distribMap[key][combo] = (distribMap[key][combo] || 0) + 1;
        });

        optionDistrib = {};
        Object.entries(distribMap).forEach(([key, combos]) => {
            const total = Object.values(combos).reduce((a, b) => a + b, 0);
            optionDistrib[key] = Object.entries(combos)
                .sort((a, b) => b[1] - a[1])
                .map(([combo, count]) => {
                    const [o1, o2, o3] = combo.split('|');
                    return { opt1: o1, opt2: o2, opt3: o3, count, pct: Math.round(count / total * 1000) / 10 };
                });
        });

        // Sheet2: 배치표 기준
        const sheet2 = workbook.Sheets[workbook.SheetNames[1]];
        const baseRows = XLSX.utils.sheet_to_json(sheet2, { header: 1 }).slice(1)
            .filter(r => r[0] && String(r[0]).toUpperCase() !== 'OFF');

        tableData = baseRows.map(r => ({
            ver:   String(r[1] ?? '').trim(),
            title: String(r[2] ?? '').trim(),
            diff:  String(r[3] ?? '').trim(),
            lv:    String(r[4] ?? '').trim(),
            note:  String(r[8] ?? '').trim(),
            extra: String(r[9] ?? '').trim(),
        }));
    })
    .catch(err => console.error('로드 실패:', err));

    const input = document.getElementById('searchInput');
    const suggestionList = document.getElementById('suggestionList');
    const resultArea = document.getElementById('result-area');

    function showSuggestions() {
        const query = input.value.toLowerCase();
        suggestionList.innerHTML = '';
        if (query.length > 0) {
            const filtered = tableData.filter(item => {
                const titleWords = item.title.toLowerCase().split(/[\s\-～~†♦♥∮、。！？!?「」()（）\[\]]+/);
                return titleWords.some(word => word === query) ||
                       item.ver.toLowerCase().includes(query) ||
                       item.diff.toLowerCase().includes(query);
            });
            if (filtered.length > 0) {
                suggestionList.style.display = 'block';
                filtered.forEach(item => {
                    const li = document.createElement('li');
                    li.textContent = item.title;
                    li.onclick = () => { input.value = item.title; performSearch(); };
                    suggestionList.appendChild(li);
                });
            } else {
                suggestionList.style.display = 'none';
            }
        } else {
            suggestionList.style.display = 'none';
        }
    }

    function optColor(val) {
        if (val === 'OFF')                          return '#808080';
        if (val === 'MIRROR')                       return 'rgba(150,220,150,1)';
        if (val === 'RANDOM' || val === 'R-RANDOM') return '#FFA500';
        if (val === 'S-RANDOM')                     return 'rgba(255,60,60,0.75)';
        return 'rgba(255,255,255,0.9)';
    }

    function renderOptionCell(title, diff) {
        const td = document.createElement('td');
        td.style.textAlign = 'left';
        td.style.lineHeight = '1.8';
        const distrib = optionDistrib[`${title}|${diff}`] || [];

        function makeSpan(opt1, opt2, opt3) {
            const span = document.createElement('span');
            const parts = [];
            if (opt1 !== 'OFF') { parts.push({ val: opt1 }); parts.push({ val: ', ', plain: true }); }
            parts.push({ val: opt2 });
            parts.push({ val: '/', plain: true });
            parts.push({ val: opt3 });
            parts.forEach(p => {
                if (p.plain) { span.appendChild(document.createTextNode(p.val)); }
                else { const s = document.createElement('span'); s.textContent = p.val; s.style.color = optColor(p.val); span.appendChild(s); }
            });
            return span;
        }

        if (distrib.length === 0) {
            td.style.color = '#666'; td.textContent = '-';
        } else if (distrib.length === 1) {
            td.appendChild(makeSpan(distrib[0].opt1, distrib[0].opt2, distrib[0].opt3));
        } else {
            distrib.forEach((d, i) => {
                const line = document.createElement('div');
                const prefix = document.createElement('span');
                prefix.textContent = `[${i + 1}] `;
                prefix.style.color = 'rgba(255,255,255,0.4)';
                line.appendChild(prefix);
                line.appendChild(makeSpan(d.opt1, d.opt2, d.opt3));
                const pct = document.createElement('span');
                pct.textContent = ` (${d.pct}%)`;
                pct.style.color = 'rgba(255,255,255,0.35)';
                line.appendChild(pct);
                td.appendChild(line);
            });
        }
        return td;
    }

    function performSearch() {
        const query = input.value.toLowerCase();
        suggestionList.style.display = 'none';
        const results = tableData.filter(item =>
            item.title.toLowerCase() === query ||
            item.ver.toLowerCase().includes(query) ||
            item.diff.toLowerCase().includes(query)
        );

        if (results.length > 0) {
            const table = document.createElement('table');
            const thead = document.createElement('thead');
            thead.innerHTML = `<tr><th>Version</th><th>Title</th><th>Difficulty</th><th>Lv</th><th>Option</th><th>Note</th><th>Vote</th></tr>`;
            table.appendChild(thead);
            const tbody = document.createElement('tbody');
            results.forEach(row => {
                const tr = document.createElement('tr');
                ['ver','title','diff','lv'].forEach(key => {
                    const td = document.createElement('td'); td.textContent = row[key] || ''; tr.appendChild(td);
                });
                tr.appendChild(renderOptionCell(row.title, row.diff));
                const noteTd = document.createElement('td'); noteTd.textContent = row.note || ''; tr.appendChild(noteTd);
                const voteTd = document.createElement('td');
                if (row.extra) {
                    const btn = document.createElement('a');
                    btn.href = `vote.html?title=${encodeURIComponent(row.title)}`;
                    btn.textContent = 'Vote'; btn.className = 'vote-btn';
                    voteTd.appendChild(btn);
                }
                tr.appendChild(voteTd);
                tbody.appendChild(tr);
            });
            table.appendChild(tbody);
            resultArea.innerHTML = '';
            resultArea.appendChild(table);
        } else {
            resultArea.innerHTML = '<p style="text-align:center;">검색 결과가 없습니다.</p>';
        }
    }
</script>

    <footer>
        <p style="text-align:center; font-size:10pt; color:#888888; margin:0; padding:12px 0 4px;">ⓒ 2026 Subby. with beatmania IIDX Double Play Group - Team. DXER</p>
        <p style="text-align:center; font-size:10pt; color:#888888; margin:0; padding:4px 0 12px;">ⓒ data provided by XYZ012, 1899, siyamaki</p>
    </footer>
</body>
</html>
