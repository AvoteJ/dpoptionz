<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP&display=swap" rel="stylesheet">
    <title>Double Play Optionz - Table</title>
    <style>
        body { background-color: #333333; color: white; font-family: 'Noto Sans JP', 'Hiragino Sans', 'Yu Gothic', Arial, sans-serif; display: flex; flex-direction: column; min-height: 100vh; margin: 0; }
        main { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 40px 20px; gap: 16px; }
        table { border-collapse: collapse; width: 95%; max-width: 1200px; background-color: rgba(255,255,255,0.05); }
        th { background-color: #5c3333; padding: 12px; border: 1px solid #555; font-size: 11pt; }
        td { padding: 10px; border: 1px solid #555; font-size: 10pt; text-align: center; }
        .vote-btn { display: inline-block; padding: 4px 14px; background-color: transparent; border: 1px solid rgba(255, 255, 255, 0.5); color: rgba(255, 255, 255, 0.8); border-radius: 4px; text-decoration: none; font-size: 10pt; cursor: pointer; }
        .vote-btn:hover { background-color: rgba(255, 255, 255, 0.1); }

        /* 카테고리 필터 */
        .filter-area { width: 95%; max-width: 1200px; display: flex; flex-direction: column; gap: 8px; }
        .filter-row { display: flex; flex-wrap: wrap; gap: 8px; }
        .filter-btn {
            padding: 6px 14px; background-color: transparent;
            border: 1px solid rgba(255,255,255,0.4); color: rgba(255,255,255,0.75);
            border-radius: 4px; cursor: pointer; font-size: 10pt;
            font-family: 'Noto Sans JP', 'Hiragino Sans', 'Yu Gothic', Arial, sans-serif;
            transition: background-color 0.15s;
        }
        .filter-btn:hover { background-color: rgba(255,255,255,0.1); }
        .filter-btn.active { background-color: rgba(255,255,255,0.2); border-color: white; color: white; }
        .sub-row {
            display: none; flex-wrap: wrap; gap: 6px;
            padding: 8px 12px;
            background-color: rgba(255,255,255,0.04);
            border-radius: 4px;
        }
        .sub-row.open { display: flex; }
        .sub-btn {
            padding: 4px 12px; background-color: transparent;
            border: 1px solid rgba(255,255,255,0.3); color: rgba(255,255,255,0.65);
            border-radius: 4px; cursor: pointer; font-size: 9.5pt;
            font-family: 'Noto Sans JP', 'Hiragino Sans', 'Yu Gothic', Arial, sans-serif;
            transition: background-color 0.15s;
        }
        .sub-btn:hover { background-color: rgba(255,255,255,0.1); }
        .sub-btn.active { background-color: rgba(255,255,255,0.18); border-color: white; color: white; }

        /* ── 공통 배너 ── */
        #site-banner {
            width: 100%;
            background-color: rgba(40, 30, 10, 0.55);
            padding: 10px 0;
            font-size: 10.5pt;
            color: rgba(255, 200, 100, 0.85);
            box-sizing: border-box;
        }

        /* ── 공통 네비게이션 ── */
        header { width: 100%; padding: 20px 0; }
        .nav-container { display: flex; justify-content: center; align-items: center; gap: 15px; flex-wrap: wrap; width: 100%; padding: 0 20px; box-sizing: border-box; position: relative; }
        .nav-link {
            text-decoration: none;
            color: rgba(255, 255, 255, 0.8);
            background-color: transparent;
            border: 1px solid rgba(255, 255, 255, 0.5);
            padding: 8px 16px;
            border-radius: 4px;
            font-size: 14pt;
            font-family: inherit;
        }
        .nav-link:hover { background-color: rgba(255, 255, 255, 0.08); }
        .nav-link-active {
            background-color: rgba(255, 255, 255, 0.12);
            border-color: rgba(255, 255, 255, 0.85);
            color: white;
        }

        /* ── 오른쪽 상단 Login / Logout 버튼 ── */
        .auth-corner-btn {
            padding: 7px 16px;
            border-radius: 4px;
            font-size: 11pt;
            font-family: inherit;
            cursor: pointer;
            transition: background-color 0.15s;
        }
        .auth-corner-btn.logout {
            background-color: transparent;
            border: 1px solid rgba(255, 100, 100, 0.55);
            color: rgba(255, 130, 130, 0.9);
        }
        .auth-corner-btn.logout:hover { background-color: rgba(255, 80, 80, 0.15); }
        .auth-corner-btn.login {
            background-color: transparent;
            border: 1px solid rgba(255, 255, 255, 0.4);
            color: rgba(255, 255, 255, 0.75);
        }
        .auth-corner-btn.login:hover { background-color: rgba(255, 255, 255, 0.1); }

        /* ── Vote 모달 ── */
        #vote-modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background-color: rgba(0, 0, 0, 0.75);
            z-index: 10000;
            justify-content: center;
            align-items: center;
        }
        #vote-modal-overlay.open { display: flex; }
        #vote-modal {
            background-color: #2e2e2e;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 6px;
            width: 92%;
            max-width: 1400px;
            max-height: 92vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            position: relative;
        }
        #vote-modal-header {
            display: flex;
            justify-content: flex-end;
            padding: 8px 12px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            flex-shrink: 0;
        }
        #vote-modal-close {
            background: transparent;
            border: 1px solid rgba(255,255,255,0.3);
            color: rgba(255,255,255,0.7);
            border-radius: 4px;
            padding: 4px 12px;
            font-size: 10pt;
            cursor: pointer;
            font-family: inherit;
        }
        #vote-modal-close:hover { background-color: rgba(255,255,255,0.1); }

        /* ── Vote 모달 ── */
        #vote-modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background-color: rgba(0,0,0,0.75);
            z-index: 10000;
            justify-content: center;
            align-items: center;
        }
        #vote-modal-overlay.open { display: flex; }
        #vote-modal {
            background-color: #2e2e2e;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 6px;
            width: 92%;
            max-width: 860px;
            max-height: 92vh;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            position: relative;
            padding: 0;
        }
        #vote-modal-header {
            display: flex;
            justify-content: flex-end;
            padding: 8px 12px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            flex-shrink: 0;
            position: sticky;
            top: 0;
            background-color: #2e2e2e;
            z-index: 1;
        }
        #vote-modal-close {
            background: transparent;
            border: 1px solid rgba(255,255,255,0.3);
            color: rgba(255,255,255,0.7);
            border-radius: 4px;
            padding: 4px 12px;
            font-size: 10pt;
            cursor: pointer;
            font-family: inherit;
        }
        #vote-modal-close:hover { background-color: rgba(255,255,255,0.1); }
        #vote-modal-body {
            padding: 24px 28px 32px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        /* vote form styles */
        #vote-modal-body table { border-collapse: collapse; width: 100%; background-color: rgba(255,255,255,0.05); }
        #vote-modal-body th { background-color: #5c3333; padding: 10px; border: 1px solid #555; font-size: 10pt; text-align: center; }
        #vote-modal-body td { padding: 10px; border: 1px solid #555; font-size: 10pt; text-align: center; }
        .vm-vote-form { padding: 20px 0 0; }
        .vm-vote-form h2 { margin: 0 0 20px 0; font-size: 13pt; font-weight: normal; color: rgba(255,255,255,0.9); border-bottom: 1px solid #555; padding-bottom: 12px; }
        .vm-vote-row { display: flex; align-items: center; gap: 20px; margin-bottom: 14px; }
        .vm-vote-label { width: 100px; font-size: 10pt; color: rgba(255,255,255,0.7); text-align: right; flex-shrink: 0; }
        .vm-vote-select { flex: 1; max-width: 300px; padding: 8px 12px; background-color: #444; border: 1px solid #555; color: white; font-family: inherit; font-size: 10pt; border-radius: 4px; cursor: pointer; outline: none; }
        .vm-vote-select:focus { border-color: rgba(255,255,255,0.5); }
        .vm-vote-textarea { width: 100%; min-height: 70px; padding: 8px 12px; background-color: #444; border: 1px solid #555; color: white; font-family: inherit; font-size: 10pt; border-radius: 4px; resize: vertical; outline: none; box-sizing: border-box; }
        .vm-vote-textarea:focus { border-color: rgba(255,255,255,0.5); }
        .vm-vote-textarea::placeholder { color: rgba(255,255,255,0.2); }
        .vm-submit-btn { display: block; margin: 24px auto 0; padding: 10px 40px; background-color: transparent; border: 1px solid rgba(255,255,255,0.5); color: rgba(255,255,255,0.8); font-family: inherit; font-size: 11pt; border-radius: 4px; cursor: pointer; transition: background-color 0.2s; }
        .vm-submit-btn:hover { background-color: rgba(255,255,255,0.1); }
        .vm-submit-btn:disabled { opacity: 0.4; cursor: not-allowed; }
        .vm-result-msg { display: none; margin-top: 16px; padding: 12px 20px; border-radius: 4px; font-size: 10pt; text-align: center; }
        .vm-result-msg.success { background-color: rgba(80,160,80,0.3); border: 1px solid rgba(80,160,80,0.6); }
        .vm-result-msg.error   { background-color: rgba(160,60,60,0.3); border: 1px solid rgba(160,60,60,0.6); }
        .vm-not-found { color: rgba(255,255,255,0.5); font-size: 11pt; text-align: center; padding: 40px 0; }
    </style>
</head>
<body>
    <div id="site-banner"></div>

    <header>
        <nav class="nav-container" id="site-nav"></nav>
        <div id="how2use-link" style="text-align:center; padding: 4px 0 2px;"></div>
    </header>
    <main>
        <div class="filter-area">
            <div class="filter-row">
                <button class="filter-btn active" data-cat="ALL">ALL</button>
                <button class="filter-btn" data-cat="12" data-sub="true">☆12</button>
                <button class="filter-btn" data-cat="11" data-sub="true">☆11</button>
                <button class="filter-btn" data-cat="ABCD">A/B/C/D</button>
                <button class="filter-btn" data-cat="EFGH">E/F/G/H</button>
                <button class="filter-btn" data-cat="IJKL">I/J/K/L</button>
                <button class="filter-btn" data-cat="MNOP">M/N/O/P</button>
                <button class="filter-btn" data-cat="QRST">Q/R/S/T</button>

                <button class="sub-btn" data-sub-val="12.4">12.4</button>
                <button class="sub-btn" data-sub-val="12.3">12.3</button>
                <button class="sub-btn" data-sub-val="12.2">12.2</button>
                <button class="sub-btn" data-sub-val="12.1">12.1</button>
                <button class="sub-btn" data-sub-val="12.0">12.0</button>
                <button class="sub-btn" data-sub-val="11.8">11.8</button>
                <button class="sub-btn" data-sub-val="11.6">11.6</button>
            </div>
            <!-- ☆11 서브메뉴 (Lv.x 기준) -->
            <div class="sub-row" id="sub-11">
                <button class="sub-btn" data-sub-val="12.1">12.1</button>
                <button class="sub-btn" data-sub-val="12.0">12.0</button>
                <button class="sub-btn" data-sub-val="11.8">11.8</button>
                <button class="sub-btn" data-sub-val="11.6">11.6</button>
                <button class="sub-btn" data-sub-val="11.4">11.4</button>
                <button class="sub-btn" data-sub-val="11.2">11.2</button>
                <button class="sub-btn" data-sub-val="11.0">11.0</button>
                <button class="sub-btn" data-sub-val="10.7">10.7</button>
                <button class="sub-btn" data-sub-val="10.5">10.5</button>
                <button class="sub-btn" data-sub-val="10.2">10.2</button>
                <button class="sub-btn" data-sub-val="10.0">10.0</button>
            </div>
        </div>

        <table>
            <thead>
                <tr>
                    <th>Version</th>
                    <th>Title</th>
                    <th>Difficulty</th>
                    <th>Lv</th>
                    <th>Lv.x</th>
                    <th>Option</th>
                    <th>Note</th>
                    <th>Vote</th>
                </tr>
            </thead>
            <tbody id="table-body"></tbody>
        </table>
    </main>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="config.js"></script>
<script src="session.js"></script>
<script src="nav.js"></script>
<script>
    let allRows       = [];
    let voteResults   = {};
    let lvxIndex      = {}; // { 'Title|DiffCode': 'Lv.x값' }
    let optionDistrib = {}; // { 'Title|Diff': [{opt1,opt2,opt3,count,pct},...] }
    let currentCat    = 'ALL';
    let currentSub    = null;

    function getLvx(title, diff) {
        const diffMap = { 'ANOTHER': 'A', 'LEGGENDARIA': 'L', 'HYPER': 'H' };
        const code = diffMap[diff] || diff.charAt(0).toUpperCase();
        return lvxIndex[`${title}|${code}`] || '';
    }

    const ALPHA_MAP = {
        'ABCD':   ['A','B','C','D'],
        'EFGH':   ['E','F','G','H'],
        'IJKL':   ['I','J','K','L'],
        'MNOP':   ['M','N','O','P'],
        'QRST':   ['Q','R','S','T'],
        'UVWXYZ': ['U','V','W','X','Y','Z'],
    };
    const ALL_ALPHA = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';

    function optColor(val) {
        if (val === 'OFF')                          return '#808080';
        if (val === 'MIRROR')                       return 'rgba(150,220,150,1)';
        if (val === 'RANDOM' || val === 'R-RANDOM') return '#FFA500';
        if (val === 'S-RANDOM')                     return 'rgba(255,60,60,0.75)';
        return 'rgba(255,255,255,0.9)';
    }

    function renderOptionSpan(opt1, opt2, opt3) {
        const span = document.createElement('span');
        const flipVisible = opt1 !== 'OFF';
        const parts = [];
        if (flipVisible) {
            parts.push({ val: opt1 });
            parts.push({ val: ', ', plain: true });
        }
        parts.push({ val: opt2 });
        parts.push({ val: '/', plain: true });
        parts.push({ val: opt3 });
        parts.forEach(p => {
            if (p.plain) {
                span.appendChild(document.createTextNode(p.val));
            } else {
                const s = document.createElement('span');
                s.textContent = p.val;
                s.style.color = optColor(p.val);
                span.appendChild(s);
            }
        });
        return span;
    }

    function renderRow(row) {
        const rowTitle = row.title || '';
        const lvx      = getLvx(rowTitle, row.diff || '');
        const tr       = document.createElement('tr');

        // Version, Title, Difficulty, Lv
        ['ver', 'title', 'diff', 'lv'].forEach(key => {
            const td = document.createElement('td');
            td.textContent = row[key] || '';
            tr.appendChild(td);
        });

        // Lv.x
        const lvxTd = document.createElement('td');
        lvxTd.textContent = lvx;
        lvxTd.style.color = lvx ? 'rgba(180,220,255,0.9)' : '#666';
        tr.appendChild(lvxTd);

        // Option (분포 데이터)
        const optTd = document.createElement('td');
        optTd.style.textAlign = 'left';
        optTd.style.lineHeight = '1.8';
        const key = `${rowTitle}|${row.diff || ''}`;
        const distrib = optionDistrib[key] || [];

        if (distrib.length === 0) {
            optTd.style.color = '#666';
            optTd.textContent = '-';
        } else if (distrib.length === 1) {
            // 단일 옵션: 번호·% 없이 표시
            optTd.appendChild(renderOptionSpan(distrib[0].opt1, distrib[0].opt2, distrib[0].opt3));
        } else {
            // 복수 옵션: [n] ... (xx.x%) 형식
            distrib.forEach((d, i) => {
                const line = document.createElement('div');
                const prefix = document.createElement('span');
                prefix.textContent = `[${i + 1}] `;
                prefix.style.color = 'rgba(255,255,255,0.4)';
                line.appendChild(prefix);
                line.appendChild(renderOptionSpan(d.opt1, d.opt2, d.opt3));
                const pct = document.createElement('span');
                pct.textContent = ` (${d.pct}%)`;
                pct.style.color = 'rgba(255,255,255,0.35)';
                line.appendChild(pct);
                optTd.appendChild(line);
            });
        }
        tr.appendChild(optTd);

        // Note
        const noteTd = document.createElement('td');
        noteTd.textContent = row.note || '';
        tr.appendChild(noteTd);

        // Vote 버튼
        const voteTd = document.createElement('td');
        if (row.extra) {
            const btn = document.createElement('a');
            btn.href = 'javascript:void(0)';
            btn.onclick = () => openVoteModal(rowTitle, row.diff || '');
            btn.textContent = 'Vote';
            btn.className = 'vote-btn';
            voteTd.appendChild(btn);
        }
        tr.appendChild(voteTd);
        return tr;
    }

    function applyFilter() {
        const tbody = document.getElementById('table-body');
        tbody.innerHTML = '';

        allRows.filter(row => {
            const title = (row.title || '').trim();
            const lvx   = getLvx(title, row.diff || '');   // Lv.x 기준
            const first = title.charAt(0).toUpperCase();

            if (currentCat === 'ALL') return true;

            if (currentCat === '12') {
                if (String(row.lv).trim() !== '12') return false;
                return currentSub ? lvx === currentSub : true;
            }
            if (currentCat === '11') {
                if (String(row.lv).trim() !== '11') return false;
                return currentSub ? lvx === currentSub : true;
            }

            if (ALPHA_MAP[currentCat]) return ALPHA_MAP[currentCat].includes(first);

            if (currentCat === 'OTHER') return !ALL_ALPHA.includes(first);

            return true;
        }).forEach(row => tbody.appendChild(renderRow(row)));
    }

    // 메인 버튼
    document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            const cat    = btn.dataset.cat;
            const hasSub = btn.dataset.sub === 'true';

            if (currentCat === cat && cat !== 'ALL') {
                currentCat = 'ALL'; currentSub = null;
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                document.querySelector('[data-cat="ALL"]').classList.add('active');
                document.querySelectorAll('.sub-row').forEach(s => s.classList.remove('open'));
                document.querySelectorAll('.sub-btn').forEach(b => b.classList.remove('active'));
                applyFilter(); return;
            }

            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentCat = cat; currentSub = null;
            document.querySelectorAll('.sub-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.sub-row').forEach(s => s.classList.remove('open'));
            if (hasSub) document.getElementById(`sub-${cat}`).classList.add('open');
            applyFilter();
        });
    });

    // 서브 버튼
    document.querySelectorAll('.sub-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            const val = btn.dataset.subVal;
            if (currentSub === val) {
                currentSub = null;
                btn.classList.remove('active');
                applyFilter(); return;
            }
            document.querySelectorAll('.sub-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentSub = val;
            applyFilter();
        });
    });

    // 데이터 로드: DPOPz_DATABASE.xlsx (Sheet1=DB, Sheet2=배치표, Sheet3=Lv.x) + 투표 집계
    Promise.all([
        fetch('DPOPz_DATABASE.xlsx').then(r => r.arrayBuffer()),
        fetch(`${APPS_SCRIPT_URL}?action=results`).then(r => r.json()).catch(() => ({ results: {} }))
    ])
    .then(([xlsxBuffer, voteData]) => {
        voteResults = voteData.results || {};

        const wb = XLSX.read(xlsxBuffer, { type: 'array' });

        // Sheet1: 옵션 분포 인덱스 구성 (Timestamp=OFF 제외)
        const ws1    = wb.Sheets[wb.SheetNames[0]];
        const dbRows = XLSX.utils.sheet_to_json(ws1, { header: 1 }).slice(1)
            .filter(r => String(r[0] ?? '').toUpperCase() !== 'OFF');

        // Title|Diff 별로 옵션 조합 카운트
        const distribMap = {};
        dbRows.forEach(r => {
            const title = String(r[1] ?? '').trim();
            const diff  = String(r[2] ?? '').trim();
            const opt1  = String(r[3] ?? '').trim() || 'OFF';
            const opt2  = String(r[4] ?? '').trim() || 'OFF';
            const opt3  = String(r[5] ?? '').trim() || 'OFF';
            if (!title || !diff) return;
            const key   = `${title}|${diff}`;
            const combo = `${opt1}|${opt2}|${opt3}`;
            if (!distribMap[key]) distribMap[key] = {};
            distribMap[key][combo] = (distribMap[key][combo] || 0) + 1;
        });

        // 비율 계산 후 optionDistrib에 저장 (내림차순 정렬)
        optionDistrib = {};
        Object.entries(distribMap).forEach(([key, combos]) => {
            const total = Object.values(combos).reduce((a, b) => a + b, 0);
            const sorted = Object.entries(combos)
                .sort((a, b) => b[1] - a[1])
                .map(([combo, count]) => {
                    const [o1, o2, o3] = combo.split('|');
                    return { opt1: o1, opt2: o2, opt3: o3, count, pct: Math.round(count / total * 1000) / 10 };
                });
            optionDistrib[key] = sorted;
        });

        // Sheet1 DB 인덱스 (Sheet2 매칭용 - 대표값은 이제 optionDistrib에서 가져오므로 빈 객체)
        const dbIndex = {};

        // Sheet2: 배치표 기준 (Version, Lv, Note, Extra)
        const ws2 = wb.Sheets[wb.SheetNames[1]];
        allRows = XLSX.utils.sheet_to_json(ws2, { header: 1 }).slice(1)
            .filter(r => r[0] && String(r[0]).toUpperCase() !== 'OFF')
            .map(r => {
                const title = String(r[2] ?? '').trim();
                const diff  = String(r[3] ?? '').trim();
                return {
                    ver:   String(r[1] ?? '').trim(),
                    title: title,
                    diff:  diff,
                    lv:    String(r[4] ?? '').trim(),
                    note:  String(r[8] ?? '').trim(),
                    extra: String(r[9] ?? '').trim(),
                };
            });

        // Sheet3: Lv.x 인덱스 구성
        const ws3   = wb.Sheets[wb.SheetNames[2]];
        const rows3 = XLSX.utils.sheet_to_json(ws3, { header: 1 });
        rows3.forEach(r => {
            const lvx   = String(r[0] ?? '').trim();
            const entry = String(r[1] ?? '').trim();
            const m = entry.match(/^(.+?)\s*\[([ALH])\]$/);
            if (m && lvx && !isNaN(parseFloat(lvx))) {
                lvxIndex[`${m[1].trim()}|${m[2]}`] = lvx;
            }
        });

        applyFilter();
    })
    .catch(err => {
        console.error('로드 실패:', err);
        document.getElementById('table-body').innerHTML =
            '<tr><td colspan="8">데이터를 불러오지 못했습니다.</td></tr>';
    });

    // ── Vote 모달 (정적 DOM, 값만 교체) ──────
    let _vmTitle = '', _vmDiff = '';

    function optColor(v) {
        if (v === 'OFF')    return '#808080';
        if (v === 'MIRROR') return 'rgba(150,220,150,1)';
        if (v === 'RANDOM' || v === 'R-RANDOM') return '#FFA500';
        if (v === 'S-RANDOM') return 'rgba(255,60,60,0.75)';
        return 'rgba(255,255,255,0.9)';
    }
    function makeOptSpan(o1, o2, o3) {
        const sp = document.createElement('span');
        const parts = [];
        if (o1 !== 'OFF') { parts.push({v:o1}); parts.push({v:', ', p:true}); }
        parts.push({v:o2}); parts.push({v:'/', p:true}); parts.push({v:o3});
        parts.forEach(p => {
            if (p.p) { sp.appendChild(document.createTextNode(p.v)); }
            else { const s = document.createElement('span'); s.textContent = p.v; s.style.color = optColor(p.v); sp.appendChild(s); }
        });
        return sp;
    }
    function vmUpdateSelectColor(el) {
        const v = el.value;
        el.style.color = v==='OFF' ? '#808080' : v==='MIRROR' ? 'rgba(150,220,150,1)' : (v==='RANDOM'||v==='R-RANDOM') ? '#FFA500' : v==='S-RANDOM' ? 'rgba(255,60,60,0.75)' : 'white';
    }
    function vmUpdateByteCount(el) {
        const bytes = new TextEncoder().encode(el.value).length;
        const disp = document.getElementById('vm-byteCount');
        if (disp) { disp.textContent = `${bytes} / 100 bytes`; disp.style.color = bytes>=90 ? 'rgba(255,160,80,0.8)' : 'rgba(255,255,255,0.3)'; }
        if (bytes > 100) { let t = el.value; while(new TextEncoder().encode(t).length>100) t=t.slice(0,-1); el.value=t; vmUpdateByteCount(el); }
    }

    function openVoteModal(title, diff) {
        _vmTitle = title;
        _vmDiff  = diff || '';

        const session = (typeof checkSession === 'function') ? checkSession() : null;

        // 값 초기화
        document.getElementById('vm-title').textContent = title;
        document.getElementById('vm-diff').textContent  = diff || '';
        const rowData = (typeof allRows !== 'undefined' ? allRows : typeof tableData !== 'undefined' ? tableData : [])
            .find(r => r.title === title && (!diff || r.diff === diff)) || null;
        document.getElementById('vm-lv').textContent  = rowData ? rowData.lv : '';
        document.getElementById('vm-lvx').textContent = (typeof getLvx === 'function') ? getLvx(title, diff) : '';

        // Option 셀 업데이트
        const optCell = document.getElementById('vm-option');
        optCell.innerHTML = '';
        const key = `${title}|${diff}`;
        const distrib = (typeof optionDistrib !== 'undefined') ? (optionDistrib[key] || []) : [];
        if (distrib.length === 0) { optCell.style.color='#666'; optCell.textContent='-'; }
        else if (distrib.length === 1) { optCell.style.color=''; optCell.appendChild(makeOptSpan(distrib[0].opt1, distrib[0].opt2, distrib[0].opt3)); }
        else {
            optCell.style.color='';
            distrib.forEach((d,i) => {
                const line = document.createElement('div');
                const pre = document.createElement('span'); pre.textContent=`[${i+1}] `; pre.style.color='rgba(255,255,255,0.4)';
                line.appendChild(pre); line.appendChild(makeOptSpan(d.opt1,d.opt2,d.opt3));
                const pct = document.createElement('span'); pct.textContent=` (${d.pct}%)`; pct.style.color='rgba(255,255,255,0.35)';
                line.appendChild(pct); optCell.appendChild(line);
            });
        }

        // 셀렉트/노트/버튼 초기화
        ['vm-opt1','vm-opt2','vm-opt3'].forEach(id => {
            const el = document.getElementById(id);
            if (el) { el.value = 'OFF'; vmUpdateSelectColor(el); }
        });
        const noteEl = document.getElementById('vm-voteNote');
        if (noteEl) noteEl.value = '';
        const byteEl = document.getElementById('vm-byteCount');
        if (byteEl) byteEl.textContent = '0 / 100 bytes';
        const msgEl = document.getElementById('vm-resultMsg');
        if (msgEl) { msgEl.style.display='none'; msgEl.textContent=''; msgEl.className='vm-result-msg'; }
        const btnEl = document.getElementById('vm-submitBtn');
        if (btnEl) { btnEl.disabled=false; btnEl.textContent='Submit'; }

        // 로그인 안된 경우
        const loginNotice = document.getElementById('vm-login-notice');
        const voteForm    = document.querySelector('.vm-vote-form');
        const songTable   = document.getElementById('vm-song-table');
        if (!session) {
            if (loginNotice) loginNotice.style.display = 'block';
            if (btnEl) btnEl.style.display = 'none';
            ['vm-opt1','vm-opt2','vm-opt3','vm-voteNote'].forEach(id => {
                const el = document.getElementById(id);
                if (el) el.disabled = true;
            });
        } else {
            if (loginNotice) loginNotice.style.display = 'none';
            if (btnEl) btnEl.style.display = '';
            ['vm-opt1','vm-opt2','vm-opt3','vm-voteNote'].forEach(id => {
                const el = document.getElementById(id);
                if (el) el.disabled = false;
            });
        }

        document.getElementById('vote-modal-overlay').classList.add('open');
        document.body.style.overflow = 'hidden';
    }

    function vmSubmitVote() {
        const btn = document.getElementById('vm-submitBtn');
        const msg = document.getElementById('vm-resultMsg');
        const session = (typeof checkSession === 'function') ? checkSession() : null;

        const now = new Date();
        const timestamp = now.toLocaleString('ko-KR', {
            timeZone:'Asia/Seoul', year:'numeric', month:'2-digit', day:'2-digit',
            hour:'2-digit', minute:'2-digit', second:'2-digit', hour12:false
        });
        const noteVal = (document.getElementById('vm-voteNote') || {value:''}).value.trim();

        const payload = {
            action: 'vote', timestamp,
            title: _vmTitle, difficulty: _vmDiff,
            option1: document.getElementById('vm-opt1').value,
            option2: document.getElementById('vm-opt2').value,
            option3: document.getElementById('vm-opt3').value,
            note: noteVal,
            id: session ? session.id : '',
        };

        btn.disabled = true;
        btn.textContent = 'Sending...';
        msg.style.display = 'none';

        fetch(`${APPS_SCRIPT_URL}?${new URLSearchParams(payload).toString()}`)
        .then(r => r.json())
        .then(result => {
            if (result.status === 'success') {
                msg.textContent = 'Vote submitted successfully!';
                msg.className = 'vm-result-msg success';
                msg.style.display = 'block';
                btn.textContent = 'Done';
            } else { throw new Error(result.message || 'unknown error'); }
        })
        .catch(err => {
            msg.textContent = 'Submission failed. Please try again.';
            msg.className = 'vm-result-msg error';
            msg.style.display = 'block';
            btn.disabled = false;
            btn.textContent = 'Submit';
        });
    }

    function closeVoteModal() {
        document.getElementById('vote-modal-overlay').classList.remove('open');
        document.body.style.overflow = '';
    }
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeVoteModal(); });
    document.getElementById('vote-modal-overlay').addEventListener('click', function(e) {
        if (e.target === this) closeVoteModal();
    });

</script>

    <footer>
        <p style="text-align:center; font-size:10pt; color:#888888; margin:0; padding:12px 0 4px;">ⓒ 2026 Subby. with beatmania IIDX Double Play Group - Team. DXER</p>
        <p style="text-align:center; font-size:10pt; color:#888888; margin:0; padding:4px 0 12px;">ⓒ data provided by XYZ012, 1899, siyamaki</p>
    </footer>
<div id="vote-modal-body"></div>
        </div>
    </div>

    <!-- Vote 모달 -->
    <div id="vote-modal-overlay">
        <div id="vote-modal">
            <div id="vote-modal-header">
                <button id="vote-modal-close" onclick="closeVoteModal()">✕ Close</button>
            </div>
            <div id="vote-modal-body">
                <!-- 곡 정보 테이블 -->
                <table id="vm-song-table">
                    <thead>
                        <tr><th>Title</th><th>Difficulty</th><th>Lv</th><th>Lv.x</th><th>Option</th></tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td id="vm-title"></td>
                            <td id="vm-diff"></td>
                            <td id="vm-lv"></td>
                            <td id="vm-lvx"></td>
                            <td id="vm-option" style="text-align:left; line-height:1.8;"></td>
                        </tr>
                    </tbody>
                </table>
                <!-- 투표 폼 -->
                <div class="vm-vote-form">
                    <h2>Vote</h2>
                    <div class="vm-vote-row">
                        <span class="vm-vote-label">FLIP</span>
                        <select id="vm-opt1" class="vm-vote-select" onchange="vmUpdateSelectColor(this)">
                            <option value="OFF">OFF</option>
                            <option value="FLIP">FLIP</option>
                        </select>
                    </div>
                    <div class="vm-vote-row">
                        <span class="vm-vote-label">1P(LEFT)</span>
                        <select id="vm-opt2" class="vm-vote-select" onchange="vmUpdateSelectColor(this)">
                            <option value="OFF">OFF</option>
                            <option value="MIRROR">MIRROR</option>
                            <option value="RANDOM">RANDOM</option>
                            <option value="R-RANDOM">R-RANDOM</option>
                            <option value="S-RANDOM">S-RANDOM</option>
                        </select>
                    </div>
                    <div class="vm-vote-row">
                        <span class="vm-vote-label">2P(RIGHT)</span>
                        <select id="vm-opt3" class="vm-vote-select" onchange="vmUpdateSelectColor(this)">
                            <option value="OFF">OFF</option>
                            <option value="MIRROR">MIRROR</option>
                            <option value="RANDOM">RANDOM</option>
                            <option value="R-RANDOM">R-RANDOM</option>
                            <option value="S-RANDOM">S-RANDOM</option>
                        </select>
                    </div>
                    <div class="vm-vote-row" style="align-items:flex-start; margin-top:8px;">
                        <span class="vm-vote-label" style="padding-top:8px;">Note</span>
                        <div style="flex:1; max-width:500px;">
                            <textarea id="vm-voteNote" class="vm-vote-textarea" maxlength="100"
                                placeholder="Comment here" oninput="vmUpdateByteCount(this)"></textarea>
                            <div id="vm-byteCount" style="font-size:9pt;color:rgba(255,255,255,0.3);text-align:right;margin-top:4px;">0 / 100 bytes</div>
                        </div>
                    </div>
                    <p id="vm-login-notice" style="display:none; text-align:center; color:rgba(255,165,0,0.9); font-size:10.5pt;">
                        Please <a href="login.html" style="color:rgba(255,165,0,0.9); text-decoration:underline;">log in</a> to vote.
                    </p>
                    <button class="vm-submit-btn" id="vm-submitBtn" onclick="vmSubmitVote()">Submit</button>
                    <div class="vm-result-msg" id="vm-resultMsg"></div>
                </div>
            </div>
        </div>
    </div>
</body>
