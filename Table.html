<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP&display=swap" rel="stylesheet">
    <title>Double Play Optionz - About</title>
    <style>
        body { background-color: #333333; color: white; font-family: 'Noto Sans JP', 'Hiragino Sans', 'Yu Gothic', Arial, sans-serif; display: flex; flex-direction: column; min-height: 100vh; margin: 0; }
        header { width: 100%; padding: 20px 0; }
        .nav-container { display: flex; justify-content: center; gap: 15px; }
        .nav-link { text-decoration: none; color: rgba(255, 255, 255, 0.8); background-color: transparent; border: 1px solid rgba(255, 255, 255, 0.5); padding: 8px 16px; border-radius: 4px; font-size: 14pt; }

        main { flex: 1; display: flex; flex-direction: column; align-items: center; padding-top: 80px; gap: 40px; }

        .about-block { width: 90%; max-width: 600px; }
        .about-title { font-size: 14pt; color: rgba(255, 255, 255, 0.5); margin: 0 0 10px 0; border-bottom: 1px solid rgba(255, 255, 255, 0.15); padding-bottom: 6px; }
        .about-content { font-size: 13pt; color: rgba(255, 255, 255, 0.9); line-height: 2; margin: 0; }
        .about-content a { color: rgba(255, 255, 255, 0.7); text-decoration: none; }
        .about-content a:hover { color: white; text-decoration: underline; }

        .version { font-size: 13pt; color: rgba(255, 255, 255, 0.35); margin-top: 20px; }
    </style>
</head>
<body>
    <div style="width:100%; background-color:rgba(255,165,0,0.15); padding:10px 0; text-align:center; font-size:12pt; color:rgba(255,200,100,0.9);">
        &lt;BETA OPEN&gt; 현재 페이지는 지속적으로 업데이트 중으로, 오류가 아직 많습니다. 또한, Vote DB 혼선 방지를 위해 투표 기능이 작동하지 않습니다.
    </div>

    <header>
        <nav class="nav-container">
            <a href="index.html" class="nav-link">Top</a>
            <a href="table.html" class="nav-link">Table</a>
            <a href="about.html" class="nav-link">About</a>
        </nav>
    </header>
 
    <main>
        <table>
            <thead>
                <tr>
                    <th>Version</th>
                    <th>Title</th>
                    <th>Difficulty</th>
                    <th>Lv</th>
                    <th>FLIP</th>
                    <th>1P(LEFT)</th>
                    <th>2P(RIGHT)</th>
                    <th>Note</th>
                    <th>Vote</th>
                </tr>
            </thead>
            <tbody id="table-body">
            </tbody>
        </table>
    </main>
 
<script src="config.js"></script>
<script>
    function parseCSVLine(line) {
        const cols = [];
        let current = '';
        let inQuotes = false;
        for (let i = 0; i < line.length; i++) {
            const ch = line[i];
            if (ch === '"') {
                inQuotes = !inQuotes;
            } else if (ch === ',' && !inQuotes) {
                cols.push(current.trim());
                current = '';
            } else {
                current += ch;
            }
        }
        cols.push(current.trim());
        return cols;
    }

    // TABLE 데이터와 투표 집계 결과를 병렬로 불러온 뒤 테이블 렌더링
    Promise.all([
        fetch(`${APPS_SCRIPT_URL}?action=table`).then(r => r.json()),
        fetch(`${APPS_SCRIPT_URL}?action=results`).then(r => r.json()).catch(() => ({ results: {} }))
    ])
    .then(([tableRes, voteData]) => {
        const rows = tableRes.rows || [];
        const voteResults = voteData.results || {};

        const tbody = document.getElementById('table-body');

        for (let i = 0; i < rows.length; i++) {
            const row = rows[i];

            const rowTitle = row.title || '';
            const vote = voteResults[rowTitle] || {};

            const tr = document.createElement('tr');

            // Version, Title, Difficulty, Lv
            ['ver', 'title', 'diff', 'lv'].forEach(key => {
                const td = document.createElement('td');
                td.textContent = row[key] || '';
                tr.appendChild(td);
            });

            // FLIP, 1P(LEFT), 2P(RIGHT): 투표 결과가 있으면 덮어쓰기
            ['opt1', 'opt2', 'opt3'].forEach(key => {
                const td = document.createElement('td');
                const val = vote[key] || row[key] || '';
                td.textContent = val;

                // 값에 따라 글자 색상 적용
                if (val === 'OFF') {
                    td.style.color = '#808080';
                } else if (val === 'MIRROR') {
                    td.style.color = 'rgba(150, 220, 150, 1)';
                } else if (val === 'RANDOM' || val === 'R-RANDOM') {
                    td.style.color = '#FFA500';
                } else if (val === 'S-RANDOM') {
                    td.style.color = 'rgba(255, 60, 60, 0.75)';
                }
                tr.appendChild(td);
            });

            // Note
            const noteTd = document.createElement('td');
            noteTd.textContent = row.note || '';
            tr.appendChild(noteTd);

            // Vote 버튼
            const voteTd = document.createElement('td');
            if (row.extra) {
                const btn = document.createElement('a');
                btn.href = `vote.html?title=${encodeURIComponent(rowTitle)}`;
                btn.textContent = 'Vote';
                btn.className = 'vote-btn';
                voteTd.appendChild(btn);
            }
            tr.appendChild(voteTd);

            tbody.appendChild(tr);
        }
    })
    .catch(err => {
        console.error('로드 실패:', err);
        document.getElementById('table-body').innerHTML =
            '<tr><td colspan="9">데이터를 불러오지 못했습니다.</td></tr>';
    });
</script>
 

    <footer>
        <p style="text-align:center; font-size:10pt; color:#888888; margin:0; padding:12px 0 4px;">ⓒ 2026 Subby. with beatmania IIDX Double Play Group - Team. DXER</p>
        <p style="text-align:center; font-size:10pt; color:#888888; margin:0; padding:4px 0 12px;">ⓒ data provided by XYZ012, 1899, siyamaki</p>
    </footer>
</body>
</html>
