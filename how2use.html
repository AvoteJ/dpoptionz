<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP&display=swap" rel="stylesheet">
    <title>Double Play Optionz - How to use</title>
    <style>
        body { background-color: #333333; color: white; font-family: 'Noto Sans JP', 'Hiragino Sans', 'Yu Gothic', Arial, sans-serif; display: flex; flex-direction: column; min-height: 100vh; margin: 0; }

        /* ── 공통 배너 ── */
        #site-banner { width: 100%; background-color: rgba(40,30,10,0.55); padding: 10px 0; font-size: 10.5pt; color: rgba(255,200,100,0.85); box-sizing: border-box; }
        /* ── 공통 네비게이션 ── */
        header { width: 100%; padding: 20px 0; }
        .nav-container { display: flex; justify-content: center; gap: 15px; flex-wrap: wrap; }
        .nav-link { text-decoration: none; color: rgba(255,255,255,0.8); background-color: transparent; border: 1px solid rgba(255,255,255,0.5); padding: 8px 16px; border-radius: 4px; font-size: 14pt; font-family: inherit; }
        .nav-link:hover { background-color: rgba(255,255,255,0.08); }
        .nav-link-active { background-color: rgba(255,255,255,0.12); border-color: rgba(255,255,255,0.85); color: white; }
        /* ── 오른쪽 상단 Login / Logout ── */
        #auth-btn-container { position: fixed; top: 14px; right: 18px; z-index: 9999; }
        .auth-corner-btn { padding: 7px 16px; border-radius: 4px; font-size: 11pt; font-family: inherit; cursor: pointer; transition: background-color 0.15s; }
        .auth-corner-btn.logout { background-color: transparent; border: 1px solid rgba(255,100,100,0.55); color: rgba(255,130,130,0.9); }
        .auth-corner-btn.logout:hover { background-color: rgba(255,80,80,0.15); }
        .auth-corner-btn.login { background-color: transparent; border: 1px solid rgba(255,255,255,0.4); color: rgba(255,255,255,0.75); }
        .auth-corner-btn.login:hover { background-color: rgba(255,255,255,0.1); }

        main { flex: 1; display: flex; flex-direction: column; align-items: center; padding-top: 60px; gap: 28px; padding-bottom: 60px; }

        /* ── How to use 블록 ── */
        .h2u-section {
            width: 90%;
            max-width: 700px;
        }

        .h2u-toggle-btn {
            width: 100%;
            text-align: left;
            background-color: transparent;
            border: none;
            border-bottom: 1px solid rgba(255,255,255,0.15);
            color: rgba(255,255,255,0.5);
            font-size: 14pt;
            font-family: 'Noto Sans JP', 'Hiragino Sans', 'Yu Gothic', Arial, sans-serif;
            padding: 10px 4px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: color 0.15s;
        }
        .h2u-toggle-btn:hover { color: rgba(255,255,255,0.85); }
        .h2u-toggle-btn.open { color: rgba(255,255,255,0.85); border-bottom-color: rgba(255,255,255,0.35); }

        .h2u-arrow { font-size: 10pt; transition: transform 0.2s; color: rgba(255,255,255,0.35); }
        .h2u-toggle-btn.open .h2u-arrow { transform: rotate(180deg); }

        .h2u-content {
            display: none;
            padding: 18px 4px 8px;
        }
        .h2u-content.open { display: block; }

        .h2u-title {
            font-size: 13pt;
            color: rgba(255,255,255,0.9);
            margin: 0 0 12px 0;
            font-weight: bold;
        }
        .h2u-body {
            font-size: 12pt;
            color: rgba(255,255,255,0.75);
            line-height: 2;
            margin: 0;
        }
    </style>
</head>
<body>

    <div id="auth-btn-container"></div>
    <div id="site-banner"></div>

    <header>
        <nav class="nav-container" id="site-nav"></nav>
        <div id="how2use-link" style="text-align:center; padding: 4px 0 2px;"></div>
    </header>

    <main>

        <!-- KOREAN -->
        <div class="h2u-section">
            <button class="h2u-toggle-btn" onclick="toggleSection(this)">
                KOREAN
                <span class="h2u-arrow">▼</span>
            </button>
            <div class="h2u-content">
                <p class="h2u-title">KOR H2U TITLE TEST</p>
                <p class="h2u-body">KOR H2U TEST</p>
            </div>
        </div>

        <!-- JAPANESE -->
        <div class="h2u-section">
            <button class="h2u-toggle-btn" onclick="toggleSection(this)">
                JAPANESE
                <span class="h2u-arrow">▼</span>
            </button>
            <div class="h2u-content">
                <p class="h2u-title">JAP H2U TITLE TEST</p>
                <p class="h2u-body">JAP H2U TEST</p>
            </div>
        </div>

        <!-- ENGLISH -->
        <div class="h2u-section">
            <button class="h2u-toggle-btn" onclick="toggleSection(this)">
                ENGLISH
                <span class="h2u-arrow">▼</span>
            </button>
            <div class="h2u-content">
                <p class="h2u-title">ENG H2U TITLE TEST</p>
                <p class="h2u-body">ENG H2U TEST</p>
            </div>
        </div>

    </main>

    <footer id="site-footer"></footer>

<script src="config.js"></script>
<script src="session.js"></script>
<script src="nav.js"></script>
<script>
    function toggleSection(btn) {
        const content = btn.nextElementSibling;
        const isOpen  = btn.classList.contains('open');

        // 모두 닫기
        document.querySelectorAll('.h2u-toggle-btn').forEach(b => {
            b.classList.remove('open');
            b.nextElementSibling.classList.remove('open');
        });

        // 클릭한 것만 열기 (이미 열려있으면 그냥 닫힘)
        if (!isOpen) {
            btn.classList.add('open');
            content.classList.add('open');
        }
    }
</script>
</body>
</html>
