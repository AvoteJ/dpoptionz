<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP&display=swap" rel="stylesheet">
    <title>Double Play Optionz - Vote</title>
    <style>
        body { background-color: #333333; color: white; font-family: 'Noto Sans JP', 'Hiragino Sans', 'Yu Gothic', Arial, sans-serif; display: flex; flex-direction: column; min-height: 100vh; margin: 0; }
        header { width: 100%; padding: 20px 0; }
        .nav-container { display: flex; justify-content: center; gap: 15px; }
        .nav-link { text-decoration: none; color: rgba(255, 255, 255, 0.8); border: 1px solid rgba(255, 255, 255, 0.5); padding: 8px 16px; border-radius: 4px; }

        main { flex: 1; padding: 40px 20px; display: flex; flex-direction: column; align-items: center; gap: 30px; }

        /* 곡 정보 테이블 - table.html과 동일 스타일 */
        table { border-collapse: collapse; width: 95%; max-width: 1200px; background-color: rgba(255,255,255,0.05); }
        th { background-color: #5c3333; padding: 12px; border: 1px solid #555; font-size: 11pt; }
        td { padding: 10px; border: 1px solid #555; font-size: 10pt; text-align: center; }

        /* 투표 폼 */
        .vote-form {
            width: 95%;
            max-width: 1200px;
            background-color: rgba(255,255,255,0.05);
            border: 1px solid #555;
            padding: 30px;
            box-sizing: border-box;
        }
        .vote-form h2 {
            margin: 0 0 24px 0;
            font-size: 14pt;
            font-weight: normal;
            color: rgba(255,255,255,0.9);
            border-bottom: 1px solid #555;
            padding-bottom: 12px;
        }
        .vote-row {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 16px;
        }
        .vote-label {
            width: 100px;
            font-size: 10pt;
            color: rgba(255,255,255,0.7);
            text-align: right;
            flex-shrink: 0;
        }
        .vote-select {
            flex: 1;
            max-width: 300px;
            padding: 8px 12px;
            background-color: #444;
            border: 1px solid #555;
            color: white;
            font-family: 'Noto Sans JP', 'Hiragino Sans', 'Yu Gothic', Arial, sans-serif;
            font-size: 10pt;
            border-radius: 4px;
            cursor: pointer;
            outline: none;
        }
        .vote-select:focus { border-color: rgba(255,255,255,0.5); }

        .submit-btn {
            display: block;
            margin: 30px auto 0;
            padding: 10px 40px;
            background-color: transparent;
            border: 1px solid rgba(255,255,255,0.5);
            color: rgba(255,255,255,0.8);
            font-family: 'Noto Sans JP', 'Hiragino Sans', 'Yu Gothic', Arial, sans-serif;
            font-size: 11pt;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        .submit-btn:hover { background-color: rgba(255,255,255,0.1); }
        .submit-btn:disabled { opacity: 0.4; cursor: not-allowed; }

        /* 결과 메시지 */
        .result-msg {
            display: none;
            margin-top: 20px;
            padding: 12px 20px;
            border-radius: 4px;
            font-size: 10pt;
            text-align: center;
        }
        .result-msg.success { background-color: rgba(80,160,80,0.3); border: 1px solid rgba(80,160,80,0.6); }
        .result-msg.error   { background-color: rgba(160,60,60,0.3); border: 1px solid rgba(160,60,60,0.6); }

        .not-found { color: rgba(255,255,255,0.5); font-size: 11pt; margin-top: 60px; }
    </style>
</head>
<body>

    <header>
        <nav class="nav-container">
            <a href="index.html" class="nav-link">&lt;Top&gt;</a>
            <a href="table.html" class="nav-link">&lt;Table&gt;</a>
            <a href="about.html" class="nav-link">&lt;About&gt;</a>
        </nav>
    </header>

    <main id="main-content">
        <!-- JS로 동적 생성 -->
    </main>

<script src="config.js"></script>
<script>
    const params = new URLSearchParams(location.search);
    const title = params.get('title');
    const main = document.getElementById('main-content');

    if (!title) {
        main.innerHTML = '<p class="not-found">곡 정보가 없습니다. <a href="table.html" style="color:rgba(255,255,255,0.6)">Table로 돌아가기</a></p>';
    } else {
        // TABLE.csv에서 해당 곡 데이터 불러오기
        fetch('TABLE.csv')
            .then(res => res.arrayBuffer())
            .then(buffer => {
                const text = new TextDecoder('utf-8').decode(buffer);

                function parseCSVLine(line) {
                    const cols = [];
                    let current = '';
                    let inQuotes = false;
                    for (let i = 0; i < line.length; i++) {
                        const ch = line[i];
                        if (ch === '"') { inQuotes = !inQuotes; }
                        else if (ch === ',' && !inQuotes) { cols.push(current.trim()); current = ''; }
                        else { current += ch; }
                    }
                    cols.push(current.trim());
                    return cols;
                }

                const lines = text.trim().split('\n');
                const cols = lines.slice(1)
                    .map(l => parseCSVLine(l))
                    .find(c => c[2] && c[2].trim() === title);

                window._voteTitle      = cols ? cols[2].trim() : title;
                window._voteDifficulty = cols ? (cols[3]?.trim() ?? '') : '';

                if (!cols) {
                    main.innerHTML = `<p class="not-found">"${title}" 곡을 찾을 수 없습니다. <a href="table.html" style="color:rgba(255,255,255,0.6)">Table로 돌아가기</a></p>`;
                    return;
                }

                // 곡 정보 테이블 렌더링
                main.innerHTML = `
                    <table>
                        <thead>
                            <tr>
                                <th>Version</th>
                                <th>Title</th>
                                <th>Difficulty</th>
                                <th>Lv</th>
                                <th>FLIP</th>
                                <th>1P(LEFT)</th>
                                <th>2P(RIGHT)</th>
                                <th>Note</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td>${cols[1] ?? ''}</td>
                                <td>${cols[2] ?? ''}</td>
                                <td>${cols[3] ?? ''}</td>
                                <td>${cols[4] ?? ''}</td>
                                <td>${cols[5] ?? ''}</td>
                                <td>${cols[6] ?? ''}</td>
                                <td>${cols[7] ?? ''}</td>
                                <td>${cols[8] ?? ''}</td>
                            </tr>
                        </tbody>
                    </table>

                    <div class="vote-form">
                        <h2>Vote</h2>

                        <div class="vote-row">
                            <span class="vote-label">Option #1</span>
                            <select id="opt1" class="vote-select">
                                <option value="OFF">OFF</option>
                                <option value="FLIP">FLIP</option>
                            </select>
                        </div>

                        <div class="vote-row">
                            <span class="vote-label">Option #2</span>
                            <select id="opt2" class="vote-select">
                                <option value="OFF">OFF</option>
                                <option value="MIRROR">MIRROR</option>
                                <option value="RANDOM">RANDOM</option>
                                <option value="R-RANDOM">R-RANDOM</option>
                                <option value="S-RANDOM">S-RANDOM</option>
                            </select>
                        </div>

                        <div class="vote-row">
                            <span class="vote-label">Option #3</span>
                            <select id="opt3" class="vote-select">
                                <option value="OFF">OFF</option>
                                <option value="MIRROR">MIRROR</option>
                                <option value="RANDOM">RANDOM</option>
                                <option value="R-RANDOM">R-RANDOM</option>
                                <option value="S-RANDOM">S-RANDOM</option>
                            </select>
                        </div>

                        <button class="submit-btn" id="submitBtn" onclick="submitVote()">Submit</button>
                        <div class="result-msg" id="resultMsg"></div>
                    </div>
                `;
            })
            .catch(err => {
                console.error('CSV 로드 실패:', err);
                main.innerHTML = '<p class="not-found">데이터를 불러오지 못했습니다.</p>';
            });
    }

    function submitVote() {
        const btn = document.getElementById('submitBtn');
        const msg = document.getElementById('resultMsg');

        // Submit 버튼을 누른 시각을 한국 시간(KST)으로 기록
        const now = new Date();
        const timestamp = now.toLocaleString('ko-KR', {
            timeZone: 'Asia/Seoul',
            year: 'numeric', month: '2-digit', day: '2-digit',
            hour: '2-digit', minute: '2-digit', second: '2-digit',
            hour12: false
        });

        const payload = {
            action:     'vote',
            timestamp:  timestamp,
            title:      window._voteTitle      ?? title,
            difficulty: window._voteDifficulty ?? '',
            option1:    document.getElementById('opt1').value,
            option2:    document.getElementById('opt2').value,
            option3:    document.getElementById('opt3').value,
        };

        btn.disabled = true;
        btn.textContent = '전송 중...';
        msg.style.display = 'none';

        const query = new URLSearchParams(payload).toString();

        fetch(`${APPS_SCRIPT_URL}?${query}`, { method: 'GET' })
        .then(res => res.json())
        .then(result => {
            if (result.status === 'success') {
                msg.textContent = '투표가 완료되었습니다!';
                msg.className = 'result-msg success';
                msg.style.display = 'block';
                btn.textContent = '완료';

                // 돌아가기 버튼 추가
                const backBtn = document.createElement('a');
                backBtn.href = 'table.html';
                backBtn.textContent = '← 목록으로 돌아가기';
                backBtn.className = 'submit-btn';
                backBtn.style.marginTop = '12px';
                backBtn.style.textDecoration = 'none';
                backBtn.style.display = 'block';
                backBtn.style.textAlign = 'center';
                msg.insertAdjacentElement('afterend', backBtn);
            } else {
                throw new Error(result.message || 'unknown error');
            }
        })
        .catch(err => {
            console.error('전송 실패:', err);
            msg.textContent = '전송에 실패했습니다. 다시 시도해주세요.';
            msg.className = 'result-msg error';
            msg.style.display = 'block';
            btn.disabled = false;
            btn.textContent = 'Submit';
        });
    }
</script>


    <footer>
        <p style="text-align:center; font-size:10pt; color:#888888; margin:0; padding:12px 0 4px;">ⓒ 2026 Subby. with beatmania IIDX Double Play Group - Team. DXER</p>
        <p style="text-align:center; font-size:10pt; color:#888888; margin:0; padding:4px 0 12px;">ⓒ data provided by XYZ012, 1899, siyamaki</p>
    </footer>
</body>
</html>
