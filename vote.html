<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP&display=swap" rel="stylesheet">
    <title>Double Play Optionz - Vote</title>
    <style>
        body { background-color: #333333; color: white; font-family: 'Noto Sans JP', 'Hiragino Sans', 'Yu Gothic', Arial, sans-serif; display: flex; flex-direction: column; min-height: 100vh; margin: 0; }

        main { flex: 1; padding: 40px 20px; display: flex; flex-direction: column; align-items: center; gap: 30px; }

        /* 곡 정보 테이블 - table.html과 동일 스타일 */
        table { border-collapse: collapse; width: 95%; max-width: 1200px; background-color: rgba(255,255,255,0.05); }
        th { background-color: #5c3333; padding: 12px; border: 1px solid #555; font-size: 11pt; }
        td { padding: 10px; border: 1px solid #555; font-size: 10pt; text-align: center; }

        /* 투표 폼 */
        .vote-form {
            width: 95%;
            max-width: 1200px;
            background-color: rgba(255,255,255,0.05);
            border: 1px solid #555;
            padding: 30px;
            box-sizing: border-box;
        }
        .vote-form h2 {
            margin: 0 0 24px 0;
            font-size: 14pt;
            font-weight: normal;
            color: rgba(255,255,255,0.9);
            border-bottom: 1px solid #555;
            padding-bottom: 12px;
        }
        .vote-row {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 16px;
        }
        .vote-label {
            width: 100px;
            font-size: 10pt;
            color: rgba(255,255,255,0.7);
            text-align: right;
            flex-shrink: 0;
        }
        .vote-select {
            flex: 1;
            max-width: 300px;
            padding: 8px 12px;
            background-color: #444;
            border: 1px solid #555;
            color: white;
            font-family: 'Noto Sans JP', 'Hiragino Sans', 'Yu Gothic', Arial, sans-serif;
            font-size: 10pt;
            border-radius: 4px;
            cursor: pointer;
            outline: none;
        }
        .vote-select:focus { border-color: rgba(255,255,255,0.5); }

        .submit-btn {
            display: block;
            margin: 30px auto 0;
            padding: 10px 40px;
            background-color: transparent;
            border: 1px solid rgba(255,255,255,0.5);
            color: rgba(255,255,255,0.8);
            font-family: 'Noto Sans JP', 'Hiragino Sans', 'Yu Gothic', Arial, sans-serif;
            font-size: 11pt;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        .submit-btn:hover { background-color: rgba(255,255,255,0.1); }
        .submit-btn:disabled { opacity: 0.4; cursor: not-allowed; }

        /* 결과 메시지 */
        .result-msg {
            display: none;
            margin-top: 20px;
            padding: 12px 20px;
            border-radius: 4px;
            font-size: 10pt;
            text-align: center;
        }
        .result-msg.success { background-color: rgba(80,160,80,0.3); border: 1px solid rgba(80,160,80,0.6); }
        .result-msg.error   { background-color: rgba(160,60,60,0.3); border: 1px solid rgba(160,60,60,0.6); }

        .not-found { color: rgba(255,255,255,0.5); font-size: 11pt; margin-top: 60px; }

        .vote-textarea {
            width: 100%;
            min-height: 70px;
            padding: 8px 12px;
            background-color: #444;
            border: 1px solid #555;
            color: white;
            font-family: 'Noto Sans JP', 'Hiragino Sans', 'Yu Gothic', Arial, sans-serif;
            font-size: 10pt;
            border-radius: 4px;
            resize: vertical;
            outline: none;
            box-sizing: border-box;
        }
        .vote-textarea:focus { border-color: rgba(255,255,255,0.5); }
        .vote-textarea::placeholder { color: rgba(255,255,255,0.2); }

        /* ── 공통 배너 ── */
        #site-banner {
            width: 100%;
            background-color: rgba(40, 30, 10, 0.55);
            padding: 10px 0;
            font-size: 10.5pt;
            color: rgba(255, 200, 100, 0.85);
            box-sizing: border-box;
        }

        /* ── 공통 네비게이션 ── */
        header { width: 100%; padding: 20px 0; }
        .nav-container { display: flex; justify-content: center; gap: 15px; flex-wrap: wrap; }
        .nav-link {
            text-decoration: none;
            color: rgba(255, 255, 255, 0.8);
            background-color: transparent;
            border: 1px solid rgba(255, 255, 255, 0.5);
            padding: 8px 16px;
            border-radius: 4px;
            font-size: 14pt;
            font-family: inherit;
        }
        .nav-link:hover { background-color: rgba(255, 255, 255, 0.08); }
        .nav-link-active {
            background-color: rgba(255, 255, 255, 0.12);
            border-color: rgba(255, 255, 255, 0.85);
            color: white;
        }

        /* ── 오른쪽 상단 Login / Logout 버튼 ── */
        #auth-btn-container {
            position: fixed;
            top: 14px;
            right: 18px;
            z-index: 9999;
        }
        .auth-corner-btn {
            padding: 7px 16px;
            border-radius: 4px;
            font-size: 11pt;
            font-family: inherit;
            cursor: pointer;
            transition: background-color 0.15s;
        }
        .auth-corner-btn.logout {
            background-color: transparent;
            border: 1px solid rgba(255, 100, 100, 0.55);
            color: rgba(255, 130, 130, 0.9);
        }
        .auth-corner-btn.logout:hover { background-color: rgba(255, 80, 80, 0.15); }
        .auth-corner-btn.login {
            background-color: transparent;
            border: 1px solid rgba(255, 255, 255, 0.4);
            color: rgba(255, 255, 255, 0.75);
        }
        .auth-corner-btn.login:hover { background-color: rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body>

    <div id="auth-btn-container"></div>
    <div id="site-banner"></div>

    <header>
        <nav class="nav-container" id="site-nav"></nav>
    </header>
    <main id="main-content">
        <!-- JS로 동적 생성 -->
    </main>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="config.js"></script>
<script src="session.js"></script>
<script src="nav.js"></script>
<script>
    // 로그인 세션 확인 → 없으면 login.html로 이동 후 실행 중단
    (function() {
        const s = checkSession();
        if (!s) {
            sessionStorage.setItem('dpopz_returnTo', location.href);
            location.href = 'login.html';
            throw new Error('redirect to login');
        }
    })();

    const params = new URLSearchParams(location.search);
    const title = params.get('title');
    const main = document.getElementById('main-content');

    if (!title) {
        main.innerHTML = '<p class="not-found">곡 정보가 없습니다. <a href="table.html" style="color:rgba(255,255,255,0.6)">Table로 돌아가기</a></p>';
    } else {
        // DPOPz DATABASE.xlsx Sheet3(Lv.x) + Apps Script 병렬 로드
        let lvxIndex = {};
        function getLvx(title, diff) {
            const diffMap = { 'ANOTHER': 'A', 'LEGGENDARIA': 'L', 'HYPER': 'H' };
            const code = diffMap[diff] || diff.charAt(0).toUpperCase();
            return lvxIndex[`${title}|${code}`] || '';
        }

        fetch('DPOPz_DATABASE.xlsx').then(r => r.arrayBuffer())
        .then(xlsxBuffer => {
            const wb = XLSX.read(xlsxBuffer, { type: 'array' });

            // Sheet3: Lv.x 인덱스
            const ws3 = wb.Sheets[wb.SheetNames[2]];
            XLSX.utils.sheet_to_json(ws3, { header: 1 }).forEach(r => {
                const lvx   = String(r[0] ?? '').trim();
                const entry = String(r[1] ?? '').trim();
                const m = entry.match(/^(.+?)\s*\[([ALH])\]$/);
                if (m && lvx && !isNaN(parseFloat(lvx))) {
                    lvxIndex[`${m[1].trim()}|${m[2]}`] = lvx;
                }
            });

            // Sheet1: 옵션 분포 인덱스 구성 (Timestamp=OFF 제외)
            const ws1 = wb.Sheets[wb.SheetNames[0]];
            const distribMap = {};
            XLSX.utils.sheet_to_json(ws1, { header: 1 }).slice(1)
                .filter(r => String(r[0] ?? '').toUpperCase() !== 'OFF')
                .forEach(r => {
                    const t    = String(r[1] ?? '').trim();
                    const d    = String(r[2] ?? '').trim();
                    const opt1 = String(r[3] ?? '').trim() || 'OFF';
                    const opt2 = String(r[4] ?? '').trim() || 'OFF';
                    const opt3 = String(r[5] ?? '').trim() || 'OFF';
                    if (!t || !d) return;
                    const key   = `${t}|${d}`;
                    const combo = `${opt1}|${opt2}|${opt3}`;
                    if (!distribMap[key]) distribMap[key] = {};
                    distribMap[key][combo] = (distribMap[key][combo] || 0) + 1;
                });

            const optionDistrib = {};
            Object.entries(distribMap).forEach(([key, combos]) => {
                const total = Object.values(combos).reduce((a, b) => a + b, 0);
                optionDistrib[key] = Object.entries(combos)
                    .sort((a, b) => b[1] - a[1])
                    .map(([combo, count]) => {
                        const [o1, o2, o3] = combo.split('|');
                        return { opt1: o1, opt2: o2, opt3: o3, count, pct: Math.round(count / total * 1000) / 10 };
                    });
            });

            function optColor(val) {
                if (val === 'OFF')                          return '#808080';
                if (val === 'MIRROR')                       return 'rgba(150,220,150,1)';
                if (val === 'RANDOM' || val === 'R-RANDOM') return '#FFA500';
                if (val === 'S-RANDOM')                     return 'rgba(255,60,60,0.75)';
                return 'rgba(255,255,255,0.9)';
            }

            function makeOptionSpan(opt1, opt2, opt3) {
                const span = document.createElement('span');
                const parts = [];
                if (opt1 !== 'OFF') { parts.push({ val: opt1 }); parts.push({ val: ', ', plain: true }); }
                parts.push({ val: opt2 });
                parts.push({ val: '/', plain: true });
                parts.push({ val: opt3 });
                parts.forEach(p => {
                    if (p.plain) { span.appendChild(document.createTextNode(p.val)); }
                    else { const s = document.createElement('span'); s.textContent = p.val; s.style.color = optColor(p.val); span.appendChild(s); }
                });
                return span;
            }

            // Sheet2: 배치표에서 곡 정보 조회 (URL의 title + diff 파라미터로 매칭)
            const urlDiff = params.get('diff') || '';
            const ws2  = wb.Sheets[wb.SheetNames[1]];
            const sheet2Rows = XLSX.utils.sheet_to_json(ws2, { header: 1 }).slice(1)
                .filter(r => r[0] && String(r[0]).toUpperCase() !== 'OFF');

            // title 일치하는 행 전체 수집 (diff 파라미터 있으면 추가 필터)
            let matched = sheet2Rows.filter(r => String(r[2] ?? '').trim() === title);
            if (urlDiff && matched.length > 1) {
                const filtered = matched.filter(r => String(r[3] ?? '').trim() === urlDiff);
                if (filtered.length > 0) matched = filtered;
            }
            const r0   = matched[0];
            const row  = r0 ? {
                ver:   String(r0[1] ?? '').trim(),
                title: String(r0[2] ?? '').trim(),
                diff:  String(r0[3] ?? '').trim(),
                lv:    String(r0[4] ?? '').trim(),
                note:  String(r0[8] ?? '').trim(),
            } : null;

                // difficulty를 submitVote()에서 참조할 수 있도록 저장
                window._voteTitle      = row ? row.title : title;
                window._voteDifficulty = row ? (row.diff || '') : '';

                if (!row) {
                    main.innerHTML = `<p class="not-found">"${title}" 곡을 찾을 수 없습니다. <a href="table.html" style="color:rgba(255,255,255,0.6)">Table로 돌아가기</a></p>`;
                    return;
                }

                // 곡 정보 테이블 렌더링
                main.innerHTML = `
                    <table>
                        <thead>
                            <tr>
                                <th>Version</th>
                                <th>Title</th>
                                <th>Difficulty</th>
                                <th>Lv</th>
                                <th>Lv.x</th>
                                <th>Option</th>
                                <th>Note</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td>${row.ver  || ''}</td>
                                <td>${row.title || ''}</td>
                                <td>${row.diff  || ''}</td>
                                <td>${row.lv    || ''}</td>
                                <td>${getLvx(row.title || '', row.diff || '')}</td>
                                <td id="option-cell" style="text-align:left; line-height:1.8;"></td>
                                <td>${row.note  || ''}</td>
                            </tr>
                        </tbody>
                    </table>

                    <div class="vote-form">
                        <h2>Vote</h2>

                        <div class="vote-row">
                            <span class="vote-label">FLIP</span>
                            <select id="opt1" class="vote-select" onchange="updateSelectColor(this)">
                                <option value="OFF">OFF</option>
                                <option value="FLIP">FLIP</option>
                            </select>
                        </div>

                        <div class="vote-row">
                            <span class="vote-label">1P(LEFT)</span>
                            <select id="opt2" class="vote-select" onchange="updateSelectColor(this)">
                                <option value="OFF">OFF</option>
                                <option value="MIRROR">MIRROR</option>
                                <option value="RANDOM">RANDOM</option>
                                <option value="R-RANDOM">R-RANDOM</option>
                                <option value="S-RANDOM">S-RANDOM</option>
                            </select>
                        </div>

                        <div class="vote-row">
                            <span class="vote-label">2P(RIGHT)</span>
                            <select id="opt3" class="vote-select" onchange="updateSelectColor(this)">
                                <option value="OFF">OFF</option>
                                <option value="MIRROR">MIRROR</option>
                                <option value="RANDOM">RANDOM</option>
                                <option value="R-RANDOM">R-RANDOM</option>
                                <option value="S-RANDOM">S-RANDOM</option>
                            </select>
                        </div>

                        <div class="vote-row" style="align-items:flex-start; margin-top:8px;">
                            <span class="vote-label" style="padding-top:8px;">Note</span>
                            <div style="flex:1; max-width:500px;">
                                <textarea id="voteNote" class="vote-textarea" maxlength="100" placeholder="Comment here"
                                    oninput="updateByteCount(this)"></textarea>
                                <div id="byteCount" style="font-size:9pt; color:rgba(255,255,255,0.3); text-align:right; margin-top:4px;">0 / 100 bytes</div>
                            </div>
                        </div>

                        <button class="submit-btn" id="submitBtn" onclick="submitVote()">Submit</button>
                        <div class="result-msg" id="resultMsg"></div>
                    </div>
                `;

                // 셀렉트 색상 초기화
                ['opt1','opt2','opt3'].forEach(id => {
                    const el = document.getElementById(id);
                    if (el) updateSelectColor(el);
                });
                const optCell = document.getElementById('option-cell');
                const distrib = optionDistrib[`${row.title}|${row.diff}`] || [];
                if (distrib.length === 0) {
                    optCell.style.color = '#666'; optCell.textContent = '-';
                } else if (distrib.length === 1) {
                    optCell.appendChild(makeOptionSpan(distrib[0].opt1, distrib[0].opt2, distrib[0].opt3));
                } else {
                    distrib.forEach((d, i) => {
                        const line = document.createElement('div');
                        const prefix = document.createElement('span');
                        prefix.textContent = `[${i + 1}] `;
                        prefix.style.color = 'rgba(255,255,255,0.4)';
                        line.appendChild(prefix);
                        line.appendChild(makeOptionSpan(d.opt1, d.opt2, d.opt3));
                        const pct = document.createElement('span');
                        pct.textContent = ` (${d.pct}%)`;
                        pct.style.color = 'rgba(255,255,255,0.35)';
                        line.appendChild(pct);
                        optCell.appendChild(line);
                    });
                }
        })
        .catch(err => {
                console.error('데이터 로드 실패:', err);
                main.innerHTML = '<p class="not-found">데이터를 불러오지 못했습니다.</p>';
            });
    }

    function updateSelectColor(el) {
        const val = el.value;
        if (val === 'OFF')                          el.style.color = '#808080';
        else if (val === 'MIRROR')                  el.style.color = 'rgba(150,220,150,1)';
        else if (val === 'RANDOM' || val === 'R-RANDOM') el.style.color = '#FFA500';
        else if (val === 'S-RANDOM')                el.style.color = 'rgba(255,60,60,0.75)';
        else                                        el.style.color = 'white';
    }

    function updateByteCount(el) {
        const bytes = new TextEncoder().encode(el.value).length;
        const display = document.getElementById('byteCount');
        if (display) {
            display.textContent = `${bytes} / 100 bytes`;
            display.style.color = bytes >= 90 ? 'rgba(255,160,80,0.8)' : 'rgba(255,255,255,0.3)';
        }
        // 100바이트 초과 시 잘라내기
        if (bytes > 100) {
            let trimmed = el.value;
            while (new TextEncoder().encode(trimmed).length > 100) {
                trimmed = trimmed.slice(0, -1);
            }
            el.value = trimmed;
            updateByteCount(el);
        }
    }

    function submitVote() {
        const btn = document.getElementById('submitBtn');
        const msg = document.getElementById('resultMsg');

        // Submit 버튼을 누른 시각을 한국 시간(KST)으로 기록
        const now = new Date();
        const timestamp = now.toLocaleString('ko-KR', {
            timeZone: 'Asia/Seoul',
            year: 'numeric', month: '2-digit', day: '2-digit',
            hour: '2-digit', minute: '2-digit', second: '2-digit',
            hour12: false
        });

        const noteEl = document.getElementById('voteNote');
        const noteVal = noteEl ? noteEl.value.trim() : '';

        const payload = {
            action:     'vote',
            timestamp:  timestamp,
            title:      window._voteTitle      ?? title,
            difficulty: window._voteDifficulty ?? '',
            option1:    document.getElementById('opt1').value,
            option2:    document.getElementById('opt2').value,
            option3:    document.getElementById('opt3').value,
            note:       noteVal,
        };

        btn.disabled = true;
        btn.textContent = '전송 중...';
        msg.style.display = 'none';

        const query = new URLSearchParams(payload).toString();

        fetch(`${APPS_SCRIPT_URL}?${query}`, { method: 'GET' })
        .then(res => res.json())
        .then(result => {
            if (result.status === 'success') {
                msg.textContent = '투표가 완료되었습니다!';
                msg.className = 'result-msg success';
                msg.style.display = 'block';
                btn.textContent = '완료';

                // 돌아가기 버튼 추가
                const backBtn = document.createElement('a');
                backBtn.href = 'table.html';
                backBtn.textContent = '← 목록으로 돌아가기';
                backBtn.className = 'submit-btn';
                backBtn.style.marginTop = '12px';
                backBtn.style.textDecoration = 'none';
                backBtn.style.display = 'block';
                backBtn.style.textAlign = 'center';
                msg.insertAdjacentElement('afterend', backBtn);
            } else {
                throw new Error(result.message || 'unknown error');
            }
        })
        .catch(err => {
            console.error('전송 실패:', err);
            msg.textContent = '전송에 실패했습니다. 다시 시도해주세요.';
            msg.className = 'result-msg error';
            msg.style.display = 'block';
            btn.disabled = false;
            btn.textContent = 'Submit';
        });
    }
</script>


    <footer id="site-footer"></footer>
</body>
</html>
